<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Building shape -->
  <path d="M70 180 L70 50 Q70 30 90 30 L110 30 Q130 30 130 50 L130 180" fill="url(#bg)" stroke="url(#glow)" stroke-width="2"/>
  <!-- Side wings -->
  <path d="M30 180 L30 100 Q30 90 40 90 L70 90 L70 180" fill="url(#bg)" stroke="url(#glow)" stroke-width="1.5" opacity="0.7"/>
  <path d="M130 90 L160 90 Q170 90 170 100 L170 180 L130 180" fill="url(#bg)" stroke="url(#glow)" stroke-width="1.5" opacity="0.7"/>
  <!-- K4 Text -->
  <text x="100" y="125" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle" filter="url(#glowFilter)">K4</text>
  <!-- GAMES Text -->
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#60a5fa" text-anchor="middle" letter-spacing="8">GAMES</text>
  <!-- Light accents -->
  <line x1="70" y1="30" x2="70" y2="180" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="30" x2="130" y2="180" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <!-- Window lights -->
  <rect x="82" y="55" width="12" height="8" rx="1" fill="#3b82f6" opacity="0.4"/>
  <rect x="106" y="55" width="12" height="8" rx="1" fill="#3b82f6" opacity="0.3"/>
  <rect x="82" y="70" width="12" height="8" rx="1" fill="#3b82f6" opacity="0.3"/>
  <rect x="106" y="70" width="12" height="8" rx="1" fill="#3b82f6" opacity="0.4"/>
  <rect x="82" y="85" width="12" height="8" rx="1" fill="#3b82f6" opacity="0.5"/>
  <rect x="106" y="85" width="12" height="8" rx="1" fill="#3b82f6" opacity="0.3"/>
</svg>
